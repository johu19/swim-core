services:
  app:
    image: node:24.11.0-alpine3.22
    working_dir: /workspace
    command: >
      sh -c "apk add --no-cache zip >/dev/null && ./scripts/watch-lambda-package.sh"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/workspace
    healthcheck:
      test: ["CMD-SHELL", "test -f /workspace/.artifacts/lambda.zip"]
      interval: 5s
      timeout: 5s
      retries: 20

  localstack:
    image: localstack/localstack:4.4.0
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "4566:4566"
    environment:
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      DEBUG: "1"
      SERVICES: lambda,apigateway,dynamodb
    volumes:
      - .:/workspace
      - ./.localstack:/var/lib/localstack
      - ./localstack/init:/etc/localstack/init/ready.d
      - /var/run/docker.sock:/var/run/docker.sock

  deployer:
    image: amazon/aws-cli:2.17.61
    depends_on:
      app:
        condition: service_healthy
      localstack:
        condition: service_started
    working_dir: /workspace
    command: >
      sh -c "./scripts/watch-localstack-lambda.sh"
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
      FUNCTION_NAME: finance-manager-api
      ARTIFACT_PATH: /workspace/.artifacts/lambda.zip
    volumes:
      - .:/workspace

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - localstack
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
      - ./proxy/nginx.dev.conf.template:/etc/nginx/templates/default.conf.template:ro
    command: >
      sh -c "
      until [ -f /workspace/.localstack/api-id ]; do
        sleep 1;
      done;
      API_ID=$$(cat /workspace/.localstack/api-id);
      export API_ID;
      export STAGE_NAME=local;
      envsubst '$$API_ID $$STAGE_NAME' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf;
      nginx -g 'daemon off;'
      "
