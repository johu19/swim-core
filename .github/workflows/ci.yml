name: CI

on:
  push:
    branches:
      - '**'

jobs:
  lambda-server:
    name: lambda-server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  cdk-infra:
    name: cdk-infra
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            infra/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install infra dependencies
        run: npm ci
        working-directory: infra

      - name: Build
        run: npm run build
        working-directory: infra

      - name: Synth
        run: npx cdk synth
        working-directory: infra
